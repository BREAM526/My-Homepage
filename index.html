<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的学习主页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#" class="logo">学习笔记</a>
            <ul class="nav-links">
                <li><a href="#home" class="nav-link active">首页</a></li>
                <li><a href="#about" class="nav-link">关于我</a></li>
                <li><a href="#homeworks" class="nav-link">作业展示</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero 区 -->
    <section class="hero" id="home">
        <div class="hero-container">
            <div class="hero-content">
                <h1 class="hero-title">你好，我是<span class="highlight">段梦熊</span></h1>
                <p class="hero-subtitle">北京大学物理学院 · 24级本科生</p>
                <p class="hero-desc">物理系学生，热爱编程，这里记录着我的学习历程和作业成果，欢迎参观交流。</p>
                <a href="#homeworks" class="btn-primary">查看作业</a>
            </div>
            <div class="hero-visual">
                <div class="avatar-placeholder">
                    <svg viewBox="0 0 120 120" fill="none">
                        <circle cx="60" cy="60" r="55" fill="#E8F0FE" stroke="#4A6FA5" stroke-width="2"/>
                        <circle cx="60" cy="45" r="20" fill="#4A6FA5"/>
                        <path d="M25 100 Q60 70 95 100" fill="#4A6FA5"/>
                    </svg>
                </div>
                <div class="floating-card card-1">📚</div>
                <div class="floating-card card-2">💻</div>
                <div class="floating-card card-3">🚀</div>
            </div>
        </div>
    </section>

    <!-- 关于我 -->
    <section class="about" id="about">
        <div class="section-container">
            <h2 class="section-title">关于我</h2>
            <div class="about-content">
                <div class="about-text">
                    <p>我是一名热爱编程的学生，目前正在学习网页开发和相关技术。</p>
                    <p>这个网站是我学习历程的记录，每个作业都代表着一次新的尝试和进步。</p>
                    <div class="skills">
                        <span class="skill-tag">HTML</span>
                        <span class="skill-tag">CSS</span>
                        <span class="skill-tag">JavaScript</span>
                        <span class="skill-tag">Python</span>
                    </div>
                </div>
                <div class="about-stats">
                    <div class="stat-item">
                        <span class="stat-number">5</span>
                        <span class="stat-label">已完成作业</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">3</span>
                        <span class="stat-label">学习项目</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">1</span>
                        <span class="stat-label">正在学习</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 作业展示 -->
    <section class="homeworks" id="homeworks">
        <div class="section-container">
            <h2 class="section-title">作业展示</h2>
            <p class="section-desc">这里是我完成的一些作业，记录着每一步的成长。</p>
            <div class="homework-grid" id="homework-grid">
                <!-- 作业卡片会通过 JS 动态生成 -->
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-container">
            <p>© 2026 段梦熊的学习主页 · 用心学习每一天</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
